<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro Notes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <h1>Maestro Notes</h1>
        <p>Your hub for course notes.</p>
        <!-- Global Navigation Mood Control Module -->
        <div class="fixed top-4 right-4 z-50 flex items-center font-sans text-xs">
            <label for="global-mood-select" class="sr-only">Select Workspace Mood Profile</label>
            <select id="global-mood-select" onchange="updateGlobalMoodState(this.value)" class="bg-slate-900 text-slate-200 border border-slate-700 px-3 py-2 rounded-lg shadow-xl backdrop-blur-md cursor-pointer focus:outline-none focus:border-indigo-500 font-semibold tracking-wide transition-all duration-200">
                <option value="clinical">🎭 Posture: Clinical</option>
                <option value="delulu">✨ Posture: Delulu</option>
                <option value="creative">🎨 Posture: Creative</option>
                <option value="focus">🧠 Posture: Hyper-Focus</option>
                <option value="apathetic">😐 Posture: Apathetic</option>
                <option value="anxious">🌊 Posture: Anxious</option>
                <option value="stressed">🧱 Posture: Stressed</option>
            </select>
        </div>
        
        <!-- Ambient Interface Graphics Injection Layer -->
        <div id="global-mood-fx-layer" class="pointer-events-none fixed inset-0 z-0"></div>
    </header>

    <div class="layout-container">
        <!--- Sidebar Navigation --->
        <aside class="sidebar">
            <h2>Modules</h2>
            <nav>
                <ul class="nav-list">
                    <li class="course-group">
                        <span class="course-title">PC100 - Pre-course</span>
                        <ul class="week-list">
                            <li><a href="#" class="active" data-content="pc100/week1.html" data-pdf="pc100/pc100_week1.pdf" data-title="PC100: Week 1">Week 1</a></li>
                        </ul>
                    </li>

                    <li class="course-group">
                        <span class="course-title">PY101 - Introduction to Python Programming</span>
                        <ul class="week-list">
                            <li><a href="#" data-content="py101/week1.html" data-pdf="py101/py101_week1.pdf" data-title="PY101: Week 1">Week 1</a></li>
                            <li><a href="#" data-content="py101/week2.html" data-pdf="py101/py101_week2.pdf" data-title="PY101: Week 2">Week 2</a></li>
                            <li><a href="#" data-content="py101/week3.html" data-pdf="py101/py101_week3.pdf" data-title="PY101: Week 3">Week 3</a></li>
                        </ul>
                    </li> 

                    <li class="course-group">
                        <span class="course-title">CS101 - Software Engineering Priciples</span>
                        <ul class="week-list">
                            <li><a href="#" data-content="cs101/week4.html" data-pdf="cs101/cs101_week4.pdf" data-title="CS101: Week 4">Week 4</a></li>
                            <li><a href="#" data-content="cs101/week5.html" data-pdf="cs101/cs101_week5.pdf" data-title="CS101: Week 5">Week 5</a></li>
                        </ul>
                    </li> 

                    <!-- Template -->
                    <!-- Make sure to change the PDF name
                    <li class="course-group">
                        <span class="course-title">PY101 - Intro</span>
                        <ul class="week-list">
                            <li><a href="#" data-content="py101/week1.html" data-pdf="py101/week1.pdf" data-title="PY101: Week 1">Week 1</a></li>
                        </ul>
                    </li> 
                    -->
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area">
            <div class="content-header">
                <h2 id="dynamic-title">PC100: Week 1</h2>
                <!-- Download Button -->
                <a href="assets/pc100/week1.pdf" download id="dynamic-download" class="btn-download">
                    Download as PDF
                </a>
            </div>
            
            <div class="notes-container" id="notes-content">
                <p>Loading content...</p>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
