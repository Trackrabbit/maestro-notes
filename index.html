<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro Notes</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23020617'/%3E%3Cpath d='M25 65 L45 35 L55 35 L75 65' stroke='%236366f1' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M40 50 L50 35 L60 50' stroke='%2338bdf8' stroke-width='6' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Ccircle cx='50' cy='25' r='4' fill='%23f8fafc'/%3E%3C/svg%3E">
</head>
<body>
    <header class="site-header">
        <h1>Maestro Notes</h1>
        <p>Your hub for course notes.</p>
    </header>

    <div class="layout-container">
        <!--- Sidebar Navigation --->
        <aside class="sidebar">
            <h2>Modules</h2>
            <nav>
                <ul class="nav-list">
                    <li class="course-group">
                        <span class="course-title">PC100 - Pre-course</span>
                        <ul class="week-list">
                            <li><a href="#" class="active" data-content="pc100/week1.html" data-title="PC100" data-week="Week 1" class="active">Week 1</a></li>
                        </ul>
                    </li>

                    <li class="course-group">
                        <span class="course-title">PY101 - Introduction to Python Programming</span>
                        <ul class="week-list">
                            <li><a href="#" data-content="py101/week1.html" data-title="PY101: Introduction to Python Programming" data-week="Week 1">Week 1</a></li>
                            <li><a href="#" data-content="py101/week2.html" data-title="PY101: Introduction to Python Programming" data-week="Week 2">Week 2</a></li>
                            <li><a href="#" data-content="py101/week3.html" data-title="PY101: Introduction to Python Programming" data-week="Week 3">Week 3</a></li>
                        </ul>
                    </li> 

                    <li class="course-group">
                        <span class="course-title">CS101 - Software Engineering Principles</span>
                        <ul class="week-list">
                            <li><a href="#" data-content="cs101/week1.html" data-title="CS101: Software Engineering Principles" data-week="Week 1">Week 1</a></li>
                            <li><a href="#" data-content="cs101/week2.html" data-title="CS101: Software Engineering Principles" data-week="Week 2">Week 2</a></li>
                            <li><a href="#" data-content="cs101/week3.html" data-title="CS101: Software Engineering Principles" data-week="Week 3">Week 3</a></li>
                        </ul>
                    </li> 
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area">
            <!-- REFACTORED HEADER ENGINE BLOCK -->
            <div class="content-header" style="border-bottom: 2px solid #6366f1; padding-bottom: 16px; margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;">
                <div>
                    <!-- Bold Course Title Row -->
                    <h1 id="dynamic-title" style="font-size: 2rem; font-weight: 800; margin: 0; padding: 0; color: #f8fafc; line-height: 1.2;">
                        PC100
                    </h1>
                    <!-- Secondary Week Designation Row -->
                    <p id="dynamic-week" style="font-size: 1.25rem; color: #6366f1; margin: 6px 0 0 0; font-weight: 500;">
                        Week 1
                    </p>
                </div>
                
                <!-- Print-On-Demand Trigger Button -->
                <button onclick="exportActiveLessonToPDF()" class="btn-download" style="cursor: pointer; background: #6366f1; color: #fff; border: none; padding: 10px 18px; border-radius: 6px; font-weight: 600; white-space: nowrap;">
                    Download as PDF
                </button>
            </div>
            
            <div class="notes-container" id="notes-content">
                <p>Loading content...</p>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
